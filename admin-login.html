<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frutamina | Login Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Nunito:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/admin.css">

  <script src="env.php" onerror="console.warn('env.php não carregado ou não processado')"></script>
  <script src="assets/js/config.js"></script>
</head>

<body>
  <div id="telaLogin">
    <div class="login-card">
      <div class="login-logo">
        <div>
          <img src="assets/svg/logo.webp" alt="">
        </div>
      </div>
      <h3>Bem-vindo de volta</h3>
      <p>Faça login para acessar o painel administrativo.</p>
      <div style="display:flex;flex-direction:column;gap:0.85rem;color: #0a0a0a;">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="admin@frutamina.com.br" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <div class="password-field-wrap">
            <input type="password" id="loginSenha" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Mostrar senha">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <p id="loginErro" style="color:var(--danger);font-size:0.83rem;display:none;font-weight:700">
          <i class="bi bi-exclamation-circle"></i> Email ou senha incorretos.
        </p>
        <button class="btn btn-primary" id="btnLogin" type="button">
          <i class="bi bi-box-arrow-in-right"></i> Entrar
        </button>
      </div>
    </div>
  </div>

  <script src="assets/js/admin-login.js" defer></script>
</body>

</html>
